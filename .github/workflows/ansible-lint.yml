---
name: ansible-quality-checks

"on":
  pull_request:
  push:
    branches:
      - main
      - testing

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pc3-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

  integration:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04

    env:
      TEST_GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install integration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          sudo apt-get update
          sudo apt-get install -y git python3-apt

      - name: Converge workstation playbook
        run: |
          ANSIBLE_PLAYBOOK_BIN="$(command -v ansible-playbook)"
          sudo -E env "PATH=$PATH" "${ANSIBLE_PLAYBOOK_BIN}" \
            --inventory inventory/hosts.yml \
            playbooks/workstation.yml \
            --extra-vars "base_ansible_pull_repo_url=${GITHUB_WORKSPACE}" \
            --extra-vars "base_ansible_pull_branch=${TEST_GIT_BRANCH}"

      - name: Run integration tests
        run: sudo -E env "PATH=$PATH" python -m pytest -q tests/integration
