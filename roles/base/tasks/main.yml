---
- name: Install base Ubuntu packages
  ansible.builtin.apt:
    name: >-
      {{
        base_workstation_base_packages
        + base_workstation_extra_packages
        + base_workstation_optional_packages
        + base_workstation_extra_optional_packages
      }}
    state: present
    update_cache: true

- name: Ensure ansible-pull runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/ansible
    - "{{ base_ansible_pull_directory }}"
    - "{{ base_ansible_pull_log_dir }}"

- name: Install ansible-pull environment file
  ansible.builtin.copy:
    dest: /etc/ansible/pull.env
    owner: root
    group: root
    mode: "0600"
    content: |
      REPO_URL={{ base_ansible_pull_repo_url }}
      BRANCH={{ base_ansible_pull_branch }}
      PLAYBOOK={{ base_ansible_pull_playbook }}
      DEST={{ base_ansible_pull_directory }}
      LOG_DIR={{ base_ansible_pull_log_dir }}

- name: Install ansible-pull wrapper
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.file', playbook_dir + '/../scripts/run-ansible-pull.sh') }}"
    dest: /usr/local/sbin/run-ansible-pull
    owner: root
    group: root
    mode: "0755"

- name: Install apt maintenance helper
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.file', playbook_dir + '/../scripts/apt-maintenance.sh') }}"
    dest: /usr/local/sbin/apt-maintenance
    owner: root
    group: root
    mode: "0755"
  when: base_apt_maintenance_enabled

- name: Install ansible-pull service unit
  ansible.builtin.template:
    src: ansible-pull.service.j2
    dest: /etc/systemd/system/ansible-pull.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install ansible-pull timer unit
  ansible.builtin.template:
    src: ansible-pull.timer.j2
    dest: /etc/systemd/system/ansible-pull.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install apt maintenance service unit
  ansible.builtin.template:
    src: apt-maintenance.service.j2
    dest: /etc/systemd/system/apt-maintenance.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: base_apt_maintenance_enabled

- name: Install apt maintenance timer unit
  ansible.builtin.template:
    src: apt-maintenance.timer.j2
    dest: /etc/systemd/system/apt-maintenance.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: base_apt_maintenance_enabled

- name: Enable ansible-pull timer
  ansible.builtin.systemd_service:
    name: ansible-pull.timer
    enabled: true
    state: started

- name: Enable apt maintenance timer
  ansible.builtin.systemd_service:
    name: apt-maintenance.timer
    enabled: true
    state: started
  when: base_apt_maintenance_enabled

- name: Disable apt maintenance timer when not wanted
  ansible.builtin.systemd_service:
    name: apt-maintenance.timer
    enabled: false
    state: stopped
  failed_when: false
  when: not base_apt_maintenance_enabled

- name: Configure APT periodic settings
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "{{ '1' if base_workstation_enable_periodic_package_list_update else '0' }}";
      APT::Periodic::Unattended-Upgrade "{{ '1' if base_workstation_enable_unattended_upgrades else '0' }}";

- name: Configure unattended-upgrades allowed origins
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52ansible-unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Origins-Pattern {
      {% for pattern in base_unattended_upgrade_origins_patterns %}
              "{{ pattern }}";
      {% endfor %}
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
  when: base_workstation_enable_unattended_upgrades

- name: Create optional workstation users
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default(omit) }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    append: true
    state: present
  loop: "{{ base_workstation_extra_users }}"
