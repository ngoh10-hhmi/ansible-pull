---
# HHMI-specific directory integration. These tasks assume this workstation
# should join hhmi.org and use SSSD plus directory-backed sudo access.
- name: Check if already joined to AD
  ansible.builtin.command: realm list
  register: base_realm_list_output
  changed_when: false

- name: Require AD enrollment settings
  ansible.builtin.assert:
    that:
      - target_hostname is defined
      - target_hostname | length > 0
      - machine_type is defined
      - machine_type in ['desktop', 'laptop']
    fail_msg: "Set target_hostname and machine_type when base_ad_enroll is true."

# target_hostname and machine_type usually come from bootstrap-persisted vars,
# not from role defaults.
- name: Set hostname correctly
  ansible.builtin.hostname:
    name: "{{ target_hostname | default(ansible_facts['hostname']) }}.hhmi.org"

- name: Set DNS via resolv.conf
  ansible.builtin.file:
    src: ../run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true

- name: Enable mkhomedir via pam-auth-update
  ansible.builtin.command: pam-auth-update --enable mkhomedir
  register: base_pam_auth_out
  changed_when: false
  failed_when: false

- name: Require an active Kerberos ticket before domain join
  ansible.builtin.command: klist -s
  changed_when: false
  when: "'hhmi.org' not in base_realm_list_output.stdout"

- name: Join AD realm using existing Kerberos credentials
  ansible.builtin.command:
    argv:
      - realm
      - join
      - --automatic-id-mapping=no
      - hhmi.org
  changed_when: true
  when: "'hhmi.org' not in base_realm_list_output.stdout"

- name: Configure idmapd.conf
  ansible.builtin.lineinfile:
    path: /etc/idmapd.conf
    regexp: '^#?Domain\s*='
    line: 'Domain = hhmi.org'
    insertafter: '^\[General\]'

- name: Deploy SSSD Configuration
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart SSSD

- name: Add sudoers definition for scicompsys and AD groups
  ansible.builtin.copy:
    dest: /etc/sudoers.d/10-scicompsys
    owner: root
    group: root
    mode: "0440"
    content: |
      %scicompsys ALL=(ALL:ALL) ALL
      {% if ad_sudo_group is defined %}
      %{{ ad_sudo_group }} ALL=(ALL:ALL) ALL
      {% endif %}
